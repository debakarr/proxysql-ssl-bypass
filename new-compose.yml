version: "3.8"

services:
  percona-mysql:
    image: percona/percona-server:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --mysql-native-password=ON

  proxysql:
    image: percona/proxysql3:3.0.6
    command: ["proxysql", "-f", "-c", "/etc/proxysql.cnf", "--initial"]
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf
      # Mount certificates to the exact hardcoded paths ProxySQL expects
      - ./certs/ca.pem:/var/lib/proxysql/proxysql-ca.pem
      - ./certs/proxysql-cert.pem:/var/lib/proxysql/proxysql-cert.pem
      - ./certs/proxysql-key.pem:/var/lib/proxysql/proxysql-key.pem
    ports:
      - "6033:6033"
      - "6032:6032"
    depends_on:
      - percona-mysql
